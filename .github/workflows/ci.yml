name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-content:
    name: Validate Tours.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"
      - name: Run Tours.json validator
        run: swift scripts/validate-tours.swift

  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Show available Xcode
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | head -20
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme "TRAVEL GUIDED TOUR" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
      - name: Report build errors
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "### CI build-failure diagnostics (temporary)"
            echo ""
            echo "**error: lines (8 lines trailing context)**"
            echo '```'
            grep -E -A8 "error:" build.log | head -200 || echo "(none)"
            echo '```'
            echo ""
            echo "**note: lines**"
            echo '```'
            grep -E "note:" build.log | head -80 || echo "(none)"
            echo '```'
            echo ""
            echo "**SwiftCompile / Compiling lines (which files compile together)**"
            echo '```'
            grep -E "SwiftCompile|Compiling|CompileSwiftSources" build.log | head -40 || echo "(none)"
            echo '```'
            echo ""
            echo "**Last 60 lines**"
            echo '```'
            tail -60 build.log
            echo '```'
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md

  test:
    name: Run unit tests
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Detect test scheme
        id: check
        run: |
          if xcodebuild -list -project "TRAVEL GUIDED TOUR.xcodeproj" 2>/dev/null \
              | grep -q "TRAVEL GUIDED TOURTests"; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Test target not yet wired into the Xcode project."
            echo "::notice::See TRAVEL GUIDED TOURTests/README.md for setup steps."
          fi
      - name: Prepare iOS simulator
        if: steps.check.outputs.has_tests == 'true'
        id: sim
        run: |
          # GitHub Actions runner-pool variance: some macos-latest runners
          # come with pre-created iPhone simulators ready to use, others
          # have only Xcode + runtimes installed and no concrete devices.
          # On the latter, `xcodebuild test -destination "name=iPhone 16"`
          # fails with "Unable to find a device matching the provided
          # destination specifier" after a ~60s timeout. Fix: explicitly
          # create + boot a simulator at job start so we control the state.
          # See docs/troubleshooting.md § "CI test job: no concrete iOS
          # Simulator on runner."
          set -e

          # Pick the latest available iOS runtime
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c '
          import json, sys
          rts = json.load(sys.stdin)["runtimes"]
          ios = [r for r in rts if r["platform"] == "iOS" and r["isAvailable"]]
          if not ios:
              sys.exit("No available iOS runtimes")
          latest = sorted(ios, key=lambda r: tuple(int(x) for x in r["version"].split(".")))[-1]
          print(latest["identifier"])
          ')
          echo "iOS runtime: $RUNTIME"

          # Pick the first iPhone device type that's still supported on
          # this runtime (model availability varies by Xcode version)
          DEVICE_TYPE=$(xcrun simctl list devicetypes -j | python3 -c '
          import json, sys
          dts = json.load(sys.stdin)["devicetypes"]
          # Prefer iPhone 16, then 17, then any iPhone
          preferred = ["iPhone 16", "iPhone 17", "iPhone 15", "iPhone 16 Pro", "iPhone 17 Pro"]
          by_name = {d["name"]: d["identifier"] for d in dts}
          for name in preferred:
              if name in by_name:
                  print(by_name[name]); sys.exit(0)
          # Fallback: any iPhone
          for d in dts:
              if "iPhone" in d["name"]:
                  print(d["identifier"]); sys.exit(0)
          sys.exit("No iPhone device types found")
          ')
          echo "Device type: $DEVICE_TYPE"

          # Create the simulator
          UDID=$(xcrun simctl create "ci-test-device" "$DEVICE_TYPE" "$RUNTIME")
          echo "Created simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

          # Boot it (xcodebuild would boot it anyway, but doing so explicitly
          # avoids a race where the first test run times out on cold boot)
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
      - name: Run tests
        if: steps.check.outputs.has_tests == 'true'
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme "TRAVEL GUIDED TOUR" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
