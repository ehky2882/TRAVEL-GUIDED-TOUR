name: Publish catalog

# Keeps the remote tour catalog in lockstep with the repo.
#
# The app fetches its catalog from the gh-pages copy of Tours.json at launch,
# with the bundled file as offline fallback. Source of truth is the bundled
# file on main: TRAVEL GUIDED TOUR/Resources/Tours.json. This workflow copies
# that one file to the gh-pages branch root whenever it changes, so the two
# can never silently drift (as they did 272-vs-300 during PR #209 testing).
#
# It only ever touches Tours.json on gh-pages — audio/, images/, privacy/,
# index.html etc. are uploaded by content sessions and are left untouched.
# It pushes only to gh-pages (never main), so it cannot retrigger itself.
#
# Second destination (since the V2 Supabase cutover, PR #255): the app now
# reads its catalog from the Supabase `get_catalog` RPC FIRST, with gh-pages
# as the fallback mirror. So the same Tours.json change must also be upserted
# into the Supabase DB, or the gh-pages fallback could drift NEWER than the
# live source. The `seed-supabase` job below does that via the existing
# idempotent seed script. It is OPT-IN: it no-ops unless the repo secret
# SUPABASE_DB_URL is set, so the gh-pages publish above is never affected.

on:
  push:
    branches: [main]
    paths:
      - "TRAVEL GUIDED TOUR/Resources/Tours.json"
  workflow_dispatch: # allow a manual force-resync from the Actions tab

permissions:
  contents: write # push the published file to gh-pages with the built-in GITHUB_TOKEN

jobs:
  publish:
    name: Publish Tours.json to gh-pages
    runs-on: ubuntu-latest
    steps:
      # main — the source of truth. We only need the one file, so sparse-checkout it.
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          path: main
          sparse-checkout: |
            TRAVEL GUIDED TOUR/Resources/Tours.json
          sparse-checkout-cone-mode: false

      # Validation gate: never publish a corrupt or empty catalog.
      # We can't run the Swift validator on a generic runner, but a JSON parse
      # plus a non-empty tours/makers sanity check catches the failure modes
      # that would actually break the app (malformed JSON, truncated file).
      - name: Validate Tours.json
        run: |
          python3 - <<'PY'
          import json, sys
          path = "main/TRAVEL GUIDED TOUR/Resources/Tours.json"
          with open(path) as f:
              data = json.load(f)  # raises -> job fails on malformed JSON
          tours = data.get("tours")
          makers = data.get("makers")
          if not isinstance(tours, list) or not tours:
              sys.exit("Validation failed: 'tours' is missing or empty")
          if not isinstance(makers, list) or not makers:
              sys.exit("Validation failed: 'makers' is missing or empty")
          print(f"OK: {len(tours)} tours / {len(makers)} makers")
          PY

      # gh-pages — the publish target. Full branch so the commit preserves
      # audio/, images/, privacy/, etc. (we only stage Tours.json).
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy Tours.json to gh-pages root
        run: cp "main/TRAVEL GUIDED TOUR/Resources/Tours.json" gh-pages/Tours.json

      # Commit + push only when the content actually changed — no empty commits.
      - name: Commit and push if changed
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Tours.json
          if git diff --cached --quiet; then
            echo "gh-pages Tours.json already matches main — nothing to publish."
            exit 0
          fi
          git commit -m "chore(catalog): publish Tours.json to gh-pages [skip ci]"
          git push origin gh-pages
          echo "Published Tours.json to gh-pages."

  # Upsert the same catalog into the live Supabase DB (the app's PRIMARY source
  # since PR #255). Independent of the gh-pages job above — runs in parallel and
  # a failure here never blocks the mirror. Opt-in: skips entirely unless the
  # SUPABASE_DB_URL secret is set. Serialized so two quick merges can't race.
  seed-supabase:
    name: Seed catalog into Supabase
    runs-on: ubuntu-latest
    concurrency:
      group: seed-supabase
      cancel-in-progress: false
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      # Secrets can't be referenced in step `if:` conditions, so read it into an
      # output here and gate the remaining steps on that.
      - name: Check for Supabase credential
        id: guard
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL not set — skipping Supabase seed (gh-pages mirror still published)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      # The seed script validates enums/FKs and exits non-zero on bad data,
      # so a malformed catalog fails the job before any DB write.
      - name: Generate seed SQL
        if: steps.guard.outputs.configured == 'true'
        run: python3 backend/seed_from_toursjson.py -o backend/seed.sql

      - name: Ensure psql is available
        if: steps.guard.outputs.configured == 'true'
        run: |
          psql --version || { sudo apt-get update && sudo apt-get install -y postgresql-client; }

      # ON_ERROR_STOP=1 + the seed's begin/commit means any failed statement
      # aborts the transaction and fails the job — never a partial apply.
      - name: Apply seed to Supabase
        if: steps.guard.outputs.configured == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f backend/seed.sql
          echo "Catalog upserted into Supabase."
